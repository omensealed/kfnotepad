[graph]
all-features = true

[advisories]
ignore = [
    { id = "RUSTSEC-2025-0141", reason = "syntect 5.3 parsing requires bincode 1.3 for bundled trusted syntax/theme dumps; upstream replacement PR #694 is not released yet." },
    { id = "RUSTSEC-2024-0436", reason = "paste is a macOS-only proc macro through Iced 0.14, WGPU 27, and metal 0.32; WGPU removes this path in v29, which Iced has not released against." },
    { id = "RUSTSEC-2026-0192", reason = "Iced requires ttf-parser through fontdb/cosmic-text, ab_glyph/winit decorations, and iced_fonts macros; fontdb's Fontations PR #91 is still a draft." },
    { id = "RUSTSEC-2026-0194", reason = "wayland-scanner 0.31.10 only parses dependency-shipped protocol XML at build time; upstream uses quick-xml 0.41 but has not released it yet." },
    { id = "RUSTSEC-2026-0195", reason = "wayland-scanner 0.31.10 uses plain Reader, not the affected NsReader; upstream quick-xml 0.41 migration is not released yet." },
]

[licenses]
allow = [
    "0BSD",
    "Apache-2.0",
    "BSL-1.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
    "AGPL-3.0-or-later",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
