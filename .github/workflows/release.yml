name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing vX.Y.Z tag to package
        required: true
        type: string

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Verify tag and crate version
        shell: bash
        run: |
          test "v$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)" = "$RELEASE_TAG"

  linux:
    needs: verify
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}
      - run: rustup toolchain install stable --profile minimal
      - name: Install Linux packaging prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2
      - name: Install verified AppImage tools
        shell: bash
        run: |
          tools_dir="$RUNNER_TEMP/kfnotepad-appimage-tools"
          ./scripts/install-pinned-appimage-tools.sh "$tools_dir"
          printf '%s\n' "$tools_dir" >> "$GITHUB_PATH"
          printf 'KFNOTEPAD_APPIMAGE_RUNTIME=%s/runtime-x86_64\n' "$tools_dir" >> "$GITHUB_ENV"
      - name: Build Linux packages
        env:
          KFNOTEPAD_PACKAGE_PLATFORM: linux-x86_64
        run: ./scripts/package.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-linux
          path: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.AppImage
          if-no-files-found: error

  windows:
    needs: verify
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}
      - run: rustup toolchain install stable --profile minimal
      - name: Build Windows packages
        shell: pwsh
        run: ./scripts/package-windows.ps1
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-windows
          path: |
            dist/*.exe
            dist/*.zip
          if-no-files-found: error

  macos:
    needs: verify
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}
      - run: rustup toolchain install stable --profile minimal
      - name: Build macOS package
        run: ./scripts/package-macos.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-macos
          path: dist/*.dmg
          if-no-files-found: error

  publish:
    needs: [linux, windows, macos]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: release
          merge-multiple: true
      - name: Create checksums
        working-directory: release
        run: sha256sum -- * > SHA256SUMS
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "$RELEASE_TAG" release/* --verify-tag --generate-notes
