name: Dependency policy probe

on:
  schedule:
    - cron: "23 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-policy-probe
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Rust
        run: rustup toolchain install stable --profile minimal
      - name: Install dependency policy tool
        run: cargo install cargo-deny --locked
      - name: Update compatible dependency versions
        run: cargo update
      - name: Check temporary advisory exceptions
        run: ./scripts/advisory-exceptions.sh
      - name: Check updated dependency policy
        run: cargo deny check advisories
