name: Dependency policy probe

on:
  schedule:
    - cron: "23 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-policy-probe
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install repository Rust toolchain
        run: ./scripts/install-rust-toolchain.sh
      - name: Install dependency policy tool
        run: |
          source ./scripts/security-tool-versions.sh
          cargo install cargo-deny --version "$CARGO_DENY_VERSION" --locked
      - name: Update compatible dependency versions
        run: cargo update
      - name: Check temporary advisory exceptions
        run: ./scripts/advisory-exceptions.sh
      - name: Check updated dependency policy
        run: cargo deny check advisories
