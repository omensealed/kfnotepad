name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14
          - windows-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - name: Format
        run: cargo fmt --check
      - name: Clippy all features
        run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - name: Test default features
        run: cargo test --locked
      - name: Test lean TUI
        run: cargo test --locked --no-default-features --features tui
      - name: Test TUI with syntax
        run: cargo test --locked --no-default-features --features "tui syntax"
      - name: Test lean GUI
        run: cargo test --locked --no-default-features --features gui
      - name: Test GUI with syntax
        run: cargo test --locked --no-default-features --features "gui syntax"
      - name: Test all features
        run: cargo test --locked --all-features
      - name: Build release TUI
        run: cargo build --locked --release --no-default-features --features "tui syntax" --bin kfnotepad
      - name: Build release GUI
        run: cargo build --locked --release --no-default-features --features "gui syntax" --bin kfnotepad-gui

  shell:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Shellcheck scripts
        run: shellcheck scripts/*.sh

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Rust
        run: rustup toolchain install stable --profile minimal
      - name: Install security tools
        run: cargo install cargo-audit cargo-deny --locked
      - name: Audit dependencies
        run: cargo audit
      - name: Check dependency policy
        run: cargo deny check
